name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (unit + DB integration via pglite)
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Cross-browser matrix (chromium, firefox, webkit, + iPhone/WebKit smoke).
      # --with-deps pulls the OS libraries each engine needs on the runner;
      # WebKit in particular needs libs the dev host (Fedora) lacks, so CI is
      # the source of truth for the webkit + mobile-safari projects.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      # Runs landing -> quiz -> gate -> results + both PDF routes against a
      # `next dev` server (started by playwright.config webServer). No Supabase
      # secrets needed: the funnel stops before the email submit, and the PDF
      # route renders via the bundled @sparticuz/chromium.
      - name: E2E (Playwright)
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
